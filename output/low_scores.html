<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B/C Grades — HealthyLA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
    background: #0d1117;
    color: #c9d1d9;
    font-size: 14px;
    line-height: 1.5;
  }
  .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #21262d;
    margin-bottom: 16px;
  }
  header h1 { font-size: 18px; color: #f0f6fc; }
  .meta { font-size: 12px; color: #8b949e; }
  .meta a { color: #58a6ff; text-decoration: none; }
  .meta a:hover { text-decoration: underline; }
  .summary {
    display: flex;
    gap: 24px;
    margin-bottom: 16px;
    padding: 12px 16px;
    background: #161b22;
    border: 1px solid #21262d;
    border-radius: 8px;
  }
  .summary-stat .num { font-size: 28px; font-weight: 700; color: #f0f6fc; }
  .summary-stat .label { font-size: 12px; color: #8b949e; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; color: #8b949e; font-weight: 500;
    padding: 8px 10px; border-bottom: 2px solid #21262d;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
    position: sticky; top: 0; background: #0d1117; cursor: pointer;
    user-select: none;
  }
  th:hover { color: #c9d1d9; }
  th .sort-arrow { font-size: 10px; margin-left: 4px; }
  td { padding: 8px 10px; border-bottom: 1px solid #21262d; }
  tr:hover td { background: #161b22; }
  .map-link { color: #58a6ff; text-decoration: none; white-space: nowrap; }
  .map-link:hover { text-decoration: underline; }
  .grade {
    display: inline-block; padding: 2px 10px; border-radius: 12px;
    font-size: 12px; font-weight: 700; min-width: 28px; text-align: center;
  }
  .grade-B { background: #d2992233; color: #d29922; }
  .grade-C { background: #f8514933; color: #f85149; }
  .score { font-weight: 600; }
  .score-low { color: #f85149; }
  .score-mid { color: #d29922; }
  .empty { text-align: center; padding: 40px; color: #8b949e; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>B/C Grades (Low Scores)</h1>
    <div class="meta">
      <span id="lastScrape"></span> &middot; <a href="dashboard.html">&larr; Dashboard</a>
    </div>
  </header>
  <div class="summary">
    <div class="summary-stat">
      <div class="num" id="totalCount">—</div>
      <div class="label">Total Below 90</div>
    </div>
    <div class="summary-stat">
      <div class="num" id="bCount">—</div>
      <div class="label">B Grades</div>
    </div>
    <div class="summary-stat">
      <div class="num" id="cCount">—</div>
      <div class="label">C Grades</div>
    </div>
  </div>
  <table>
    <thead>
      <tr>
        <th data-col="facility_name">Facility <span class="sort-arrow"></span></th>
        <th data-col="address">Address <span class="sort-arrow"></span></th>
        <th data-col="city">City <span class="sort-arrow"></span></th>
        <th data-col="inspection_date">Inspected <span class="sort-arrow"></span></th>
        <th data-col="score">Score <span class="sort-arrow"></span></th>
        <th data-col="grade">Grade <span class="sort-arrow"></span></th>
        <th>Map</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>
<script>
const BASE = './data';
let scores = [];
let sortCol = 'score';
let sortAsc = true;

async function load() {
  try {
    const res = await fetch(`${BASE}/low_scores.json?t=${Date.now()}`);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    scores = data.low_scores || [];
    if (data.last_scrape) {
      document.getElementById('lastScrape').textContent =
        'Last scrape: ' + new Date(data.last_scrape).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    document.getElementById('totalCount').textContent = scores.length;
    document.getElementById('bCount').textContent = scores.filter(s => s.grade === 'B').length;
    document.getElementById('cCount').textContent = scores.filter(s => s.grade === 'C').length;
    render();
  } catch (e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="7" class="empty">Failed to load score data. Make sure the local server is running.</td></tr>';
  }
}

function render() {
  const sorted = [...scores].sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'score') { va = Number(va); vb = Number(vb); }
    else if (sortCol === 'inspection_date') { va = new Date(va); vb = new Date(vb); }
    else { va = (va || '').toString().toLowerCase(); vb = (vb || '').toString().toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  if (sorted.length === 0) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="7" class="empty">No low scores found.</td></tr>';
    return;
  }

  document.getElementById('tableBody').innerHTML = sorted.map(s => {
    const scoreCls = s.score < 80 ? 'score-low' : 'score-mid';
    return `
    <tr>
      <td><strong>${esc(s.facility_name)}</strong></td>
      <td>${esc(s.address)}</td>
      <td>${esc(s.city)}</td>
      <td>${fmtDate(s.inspection_date)}</td>
      <td class="score ${scoreCls}">${s.score}</td>
      <td><span class="grade grade-${s.grade}">${s.grade}</span></td>
      <td><a class="map-link" href="${esc(s.google_maps_link)}" target="_blank">View</a></td>
    </tr>
    `;
  }).join('');

  document.querySelectorAll('th[data-col]').forEach(th => {
    const arrow = th.querySelector('.sort-arrow');
    arrow.textContent = th.dataset.col === sortCol ? (sortAsc ? '\u25B2' : '\u25BC') : '';
  });
}

function esc(s) {
  const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
}

function fmtDate(s) {
  return new Date(s).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = true; }
    render();
  });
});

load();
</script>
</body>
</html>
